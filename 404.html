<!DOCTYPE html>
<head>
<title>Error!</title>
<link rel="shortcut icon" type="image/x-icon" href="https://pggamer2.github.io/favicon.ico">
<script src="https://pggamer2.github.io/error.js"></script>
<style>
@font-face {
  font-family: 'aileronBI';
  src: url('https://pggamer2.github.io/aileron-bolditalic.otf') format('opentype');
}
p, a, h1 {
    font:inherit;
	color: #f1f1f1;
    font-family: aileronBI;
    vertical-align:baseline
}
body{
  margin: 0;
  padding: 0;
  background: #34495e;
}
.eyes{
  width: 100%;
  text-align: center;
}
.eye{
  width: 240px;
  height: 120px;
  background: #fff;
  display: inline-block;
  margin: 40px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}
.ball{
  width: 40px;
  height: 40px;
  background: #000;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  border: 15px solid #333;
}
#header {
  display: none;
  background-color: #333;
  position: fixed;
  top: 0px;
  left: 0px;
  width: 100%;
  height: 4.5em;
  vertical-align: middle;
}
.menu-icon {
  display: inline-block;
  cursor: pointer;
  margin-left:1em;
  margin-top:1em;
  position: fixed;
}
.bar1, .bar2, .bar3 {
  width: 35px;
  height: 5px;
  background-color: #282828;
  margin: 6px 0;
  transition: 0.4s;
}
.change .bar1 {
  -moz-transform: rotate(-45deg) translate(-9px, 6px);
  -o-transform: rotate(-45deg) translate(-9px, 6px);
  -webkit-transform: rotate(-45deg) translate(-9px, 6px);
  -ms-transform: rotate(-45deg) translate(-9px, 6px);
  transform: rotate(-45deg) translate(-9px, 6px);
  background-color: white;
}
.change .bar2 {opacity: 0; background-color: white;}
.change .bar3 {
  -ms-transform: rotate(45deg) translate(-8px, -8px);
  -webkit-transform: rotate(45deg) translate(-8px, -8px);
  -o-transform: rotate(45deg) translate(-8px, -8px);
  -moz-transform: rotate(45deg) translate(-8px, -8px);
  transform: rotate(45deg) translate(-8px, -8px);
  background-color: white;
}
</style>
</head>
<body>
<span id="header">
<p style="color: white; text-align: center; padding-top: 3.5px; font-size: 120%;"><a style="cursor:pointer;" onclick="location = 'https://pggamer2.github.io/MC';">MCreations</a>&emsp;&emsp;<a style="cursor:pointer;" onclick="location = 'https://pggamer2.github.io/GAMES/home';">Games</a>&emsp;&emsp;<a style="cursor:pointer;" onclick="location = 'https://pggamer2.github.io/CODE';">Coding</a></p>
</span>

<div class="menu-icon" onclick="OpenMenuTab(this)">
  <div class="bar1"></div>
  <div class="bar2"></div>
  <div class="bar3"></div>
</div>

<br><br><br>
<h1 style="text-align: center;font-size:300%;">OOPS...</h1>
<br>

<div id="404">
  <p style="text-align: center;font-size:150%;">Error 404</p>
  <p style="text-align: center;font-size:130%;">Page not found!</p>
</div>
<div id="mobT">
  <br>
  <p style="text-align: center;font-size:140%;">To play you have to use your pc!</p>
</div>

  <br>
  <div class="eyes">
    <div class="eye">
      <div class="ball"></div>
    </div>
    <div class="eye">
      <div class="ball"></div>
    </div>
  </div>
  <br>
  <script>
    var balls = document.getElementsByClassName("ball");
  document.onmousemove = function(){
    var x = event.clientX * 100 / window.innerWidth + "%";
    var y = event.clientY * 100 / window.innerHeight + "%";
    //event.clientX => get the horizontal coordinate of the mouse
    //event.clientY => get the Vertical coordinate of the mouse
    //window.innerWidth => get the browser width
    //window.innerHeight => get the browser height

    for(var i=0;i<2;i++){
      balls[i].style.left = x;
      balls[i].style.top = y;
      balls[i].style.transform = "translate(-"+x+",-"+y+")";
    }
  }
  </script>
<script>
mchanged = "false";

function OpenMenuTab(mx) {
  if (mchanged == "true") {
  mx.classList.toggle("change");
  document.getElementById("header").style.display = 'none';
  mchanged = "false";
  } else {
  mx.classList.toggle("change");
  document.getElementById("header").style.display = 'block';
  mchanged = "true";
  }
}
</script>
</body>
